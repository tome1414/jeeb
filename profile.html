<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール — JEEB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F8F6;
      --white: #FFFFFF;
      --black: #0A0A0A;
      --gray-100: #F0F0EE;
      --gray-200: #E0E0DC;
      --gray-400: #9A9A96;
      --gray-600: #5A5A56;
      --live: #00D084;
      --ai: #0066FF;
      --ai-dim: rgba(0,102,255,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', 'Noto Sans', sans-serif;
      background: var(--bg);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Top Bar ─── */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248,248,246,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--gray-200);
      height: 56px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--black);
      font-size: 20px; border-radius: 50%;
      transition: background 0.15s; cursor: pointer; border: none; background: none;
    }
    .back-btn:hover { background: var(--gray-100); }

    .lang-group { display: flex; gap: 2px; }
    .lang-btn {
      padding: 5px 10px; border: none; background: none;
      font-size: 11px; font-weight: 500; color: var(--gray-400);
      cursor: pointer; border-radius: 4px; letter-spacing: 0.06em;
      transition: all 0.15s; font-family: inherit;
    }
    .lang-btn.active { background: var(--black); color: var(--white); }

    /* ─── Content ─── */
    .content { padding: 0; padding-bottom: 80px; }

    .block {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      padding: 24px;
    }

    .block-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gray-400); margin-bottom: 16px;
    }

    /* ─── User Card ─── */
    .user-card {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 20px;
    }
    .user-avatar {
      width: 64px; height: 64px; border-radius: 14px;
      background: var(--gray-100); display: flex;
      align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0;
    }
    .user-info { flex: 1; }
    .user-name {
      font-size: 16px; font-weight: 700; margin-bottom: 4px;
    }
    .user-email {
      font-size: 12px; color: var(--gray-400); margin-bottom: 8px;
    }
    .user-tier-badge {
      display: inline-block; padding: 4px 10px;
      border-radius: 100px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .user-tier-badge.silver {
      background: var(--gray-100); color: var(--gray-400);
    }
    .user-tier-badge.gold {
      background: rgba(251,191,36,0.15); color: #B35F00;
    }
    .user-tier-badge.black {
      background: var(--black); color: var(--white);
    }

    /* ─── Subscription Status ─── */
    .subscription-status {
      background: var(--ai-dim); border-radius: 10px;
      padding: 14px; margin-bottom: 20px;
    }
    .sub-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 13px;
    }
    .sub-label { color: var(--gray-400); }
    .sub-value { font-weight: 600; }
    .sub-value.gold { color: #B35F00; }
    .sub-value.black { color: var(--black); }
    .sub-divider {
      border: none; border-top: 1px solid var(--gray-200);
      margin: 8px 0;
    }
    .upgrade-btn {
      width: 100%; padding: 10px;
      background: var(--ai); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      margin-top: 12px; transition: opacity 0.15s;
    }
    .upgrade-btn:hover { opacity: 0.85; }

    /* ─── Benefits ─── */
    .benefits-list {
      display: flex; flex-direction: column; gap: 10px;
    }
    .benefit-item {
      display: flex; gap: 10px; padding: 10px 0;
      font-size: 13px; color: var(--gray-600);
      border-bottom: 1px solid var(--gray-100);
    }
    .benefit-item:last-child { border-bottom: none; }
    .benefit-icon {
      width: 24px; height: 24px; display: flex;
      align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    /* ─── Tabs ─── */
    .profile-tabs {
      display: flex; gap: 0; padding: 0 24px;
      border-bottom: 1px solid var(--gray-200);
      background: var(--white); position: sticky; top: 56px;
      z-index: 50;
    }
    .profile-tab {
      flex: 1; padding: 12px 0; font-size: 13px;
      font-weight: 400; color: var(--gray-400);
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.15s;
      background: none; border: none; font-family: inherit;
      text-align: center;
    }
    .profile-tab.active {
      color: var(--black); font-weight: 600;
      border-bottom-color: var(--black);
    }

    /* ─── Tab Content ─── */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* ─── Saved Restaurants ─── */
    .saved-item {
      display: flex; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--gray-100);
      align-items: flex-start;
    }
    .saved-item:last-child { border-bottom: none; }
    .saved-item-img {
      width: 52px; height: 52px; border-radius: 8px;
      background: var(--gray-100); flex-shrink: 0;
      font-size: 24px; display: flex; align-items: center;
      justify-content: center;
    }
    .saved-item-info { flex: 1; }
    .saved-item-name {
      font-size: 13px; font-weight: 600; margin-bottom: 2px;
    }
    .saved-item-meta {
      font-size: 11px; color: var(--gray-400);
    }
    .saved-item-actions {
      display: flex; gap: 6px;
    }
    .saved-item-btn {
      padding: 6px 10px; border: 1px solid var(--gray-200);
      border-radius: 6px; font-size: 11px; cursor: pointer;
      background: var(--white); font-family: inherit;
      transition: background 0.15s;
    }
    .saved-item-btn:hover { background: var(--gray-100); }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center; padding: 40px 20px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title {
      font-size: 14px; font-weight: 600; margin-bottom: 4px;
    }
    .empty-text {
      font-size: 12px; color: var(--gray-400);
    }

    /* ─── Settings ─── */
    .settings-item {
      display: flex; justify-content: space-between;
      align-items: center; padding: 16px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-label { font-size: 13px; font-weight: 500; }
    .settings-value {
      font-size: 12px; color: var(--gray-400);
    }

    /* ─── Buttons ─── */
    .logout-btn {
      width: 100%; padding: 12px;
      background: none; border: 1.5px solid #FF3B30;
      color: #FF3B30; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s; margin-top: 20px;
    }
    .logout-btn:hover { background: rgba(255,59,48,0.08); }

    .upgrade-cta-btn {
      width: 100%; padding: 14px;
      background: var(--ai); color: var(--white);
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      margin-top: 16px; transition: opacity 0.15s;
    }
    .upgrade-cta-btn:hover { opacity: 0.85; }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(248,248,246,0.96); backdrop-filter: blur(16px);
      border-top: 1px solid var(--gray-200);
      display: flex; padding: 8px 0 20px; z-index: 200;
    }
    .nav-item {
      flex: 1; text-align: center; cursor: pointer;
    }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label {
      display: block; font-size: 10px;
      color: var(--gray-400); margin-top: 2px;
      letter-spacing: 0.04em;
    }
    .nav-item.active .nav-label {
      color: var(--black); font-weight: 600;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <div class="lang-group">
    <button class="lang-btn active" onclick="setLang(this)">JP</button>
    <button class="lang-btn" onclick="setLang(this)">EN</button>
    <button class="lang-btn" onclick="setLang(this)">TH</button>
  </div>
</div>

<div class="content">
  <!-- User Info -->
  <div class="block">
    <div class="user-card">
      <div class="user-avatar" id="avatar">👤</div>
      <div class="user-info">
        <div class="user-name" id="user-name">山田太郎</div>
        <div class="user-email" id="user-email">yamada@example.com</div>
        <div class="user-tier-badge silver" id="tier-badge">🥈 Silver</div>
      </div>
    </div>

    <!-- Subscription Status -->
    <div class="subscription-status" id="subscription-block" style="display:none;">
      <div class="sub-row">
        <span class="sub-label" id="label-tier">現在のランク</span>
        <span class="sub-value" id="sub-tier">Silver</span>
      </div>
      <div class="sub-row" id="renewal-row" style="display:none;">
        <span class="sub-label" id="label-renewal">更新日</span>
        <span class="sub-value" id="sub-renewal">2026年5月10日</span>
      </div>
      <div class="sub-divider"></div>
      <button class="upgrade-btn" id="upgrade-btn" onclick="showUpgradeModal()">ゴールド会員にアップグレード</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="profile-tabs">
    <button class="profile-tab active" onclick="switchTab(this, 'benefits')" id="tab-benefits">特典</button>
    <button class="profile-tab" onclick="switchTab(this, 'saved')" id="tab-saved">保存済み</button>
    <button class="profile-tab" onclick="switchTab(this, 'history')" id="tab-history">履歴</button>
    <button class="profile-tab" onclick="switchTab(this, 'settings')" id="tab-settings">設定</button>
  </div>

  <!-- Benefits Tab -->
  <div class="tab-content active" id="benefits-content">
    <div class="block">
      <div class="block-label" id="label-benefits">会員特典</div>
      <div class="benefits-list" id="benefits-list">
        <div class="benefit-item">
          <div class="benefit-icon">🔍</div>
          <div>全店舗検索が可能</div>
        </div>
        <div class="benefit-item">
          <div class="benefit-icon">💬</div>
          <div>レビューの一部表示</div>
        </div>
        <div class="benefit-item">
          <div class="benefit-icon">🔔</div>
          <div>予約機能のテスト利用</div>
        </div>
      </div>

      <div id="upgrade-banner" style="display:none; margin-top:20px; padding:14px; background:rgba(251,191,36,0.1); border-radius:10px; border:1px solid rgba(251,191,36,0.25);">
        <div style="font-size:13px; font-weight:600; color:#92400E; margin-bottom:8px;">✨ ゴールド会員でもっとお得に</div>
        <div style="font-size:12px; color:#92400E; margin-bottom:12px; line-height:1.6;">月150～250THBで会計5～10%OFF、優先予約など、充実した特典をご利用いただけます。</div>
        <button class="upgrade-cta-btn" onclick="showUpgradeModal()">ゴールド会員について詳しく</button>
      </div>
    </div>
  </div>

  <!-- Saved Tab -->
  <div class="tab-content" id="saved-content">
    <div class="block">
      <div class="block-label" id="label-saved">お気に入り</div>
      <div id="saved-list"></div>
    </div>
  </div>

  <!-- History Tab -->
  <div class="tab-content" id="history-content">
    <div class="block">
      <div class="block-label" id="label-history">訪問履歴</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Settings Tab -->
  <div class="tab-content" id="settings-content">
    <div class="block">
      <div class="block-label" id="label-settings">設定</div>

      <div class="settings-item">
        <div class="settings-label" id="label-language">言語</div>
        <div class="settings-value" id="language-value">日本語</div>
      </div>

      <div class="settings-item">
        <div class="settings-label" id="label-notifications">通知</div>
        <input type="checkbox" id="notifications-toggle" checked style="width:18px; height:18px; cursor:pointer; accent-color:var(--ai);">
      </div>

      <div class="settings-item">
        <div class="settings-label" id="label-email">メールアドレス</div>
        <div class="settings-value" id="email-value">yamada@example.com</div>
      </div>

      <button class="logout-btn" id="logout-btn" onclick="handleLogout()">ログアウト</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'">
    <div class="nav-icon">⌂</div>
    <span class="nav-label" id="nav-home">Home</span>
  </div>
  <div class="nav-item">
    <div class="nav-icon">⌕</div>
    <span class="nav-label" id="nav-search">Search</span>
  </div>
  <div class="nav-item" onclick="window.location.href='index.html'; setTimeout(() => { document.querySelector('[onclick*=showView]')?.click?.(); }, 100);">
    <div class="nav-icon">◎</div>
    <span class="nav-label" id="nav-map">Map</span>
  </div>
  <div class="nav-item">
    <div class="nav-icon">♡</div>
    <span class="nav-label" id="nav-saved">Saved</span>
  </div>
  <div class="nav-item active">
    <div class="nav-icon">◯</div>
    <span class="nav-label" id="nav-profile">Profile</span>
  </div>
</div>

<script>
  // ─── Language ───
  let currentLang = localStorage.getItem('jeeb-lang') || 'ja';

  const translations = {
    ja: {
      'label-tier': '現在のランク',
      'label-renewal': '更新日',
      'label-benefits': '会員特典',
      'label-saved': 'お気に入り',
      'label-history': '訪問履歴',
      'label-settings': '設定',
      'label-language': '言語',
      'label-notifications': '通知',
      'label-email': 'メールアドレス',
      'logout-btn': 'ログアウト',
      'tab-benefits': '特典',
      'tab-saved': '保存済み',
      'tab-history': '履歴',
      'tab-settings': '設定',
      'nav-home': 'Home',
      'nav-search': 'Search',
      'nav-map': 'Map',
      'nav-saved': 'Saved',
      'nav-profile': 'Profile'
    },
    en: {
      'label-tier': 'Current Tier',
      'label-renewal': 'Renewal Date',
      'label-benefits': 'Member Benefits',
      'label-saved': 'Saved Restaurants',
      'label-history': 'Visit History',
      'label-settings': 'Settings',
      'label-language': 'Language',
      'label-notifications': 'Notifications',
      'label-email': 'Email Address',
      'logout-btn': 'Log Out',
      'tab-benefits': 'Benefits',
      'tab-saved': 'Saved',
      'tab-history': 'History',
      'tab-settings': 'Settings',
      'nav-home': 'Home',
      'nav-search': 'Search',
      'nav-map': 'Map',
      'nav-saved': 'Saved',
      'nav-profile': 'Profile'
    },
    th: {
      'label-tier': 'ชั้นสมาชิก',
      'label-renewal': 'วันต่ออายุ',
      'label-benefits': 'สิทธิประโยชน์สมาชิก',
      'label-saved': 'ร้านที่บันทึก',
      'label-history': 'ประวัติการเยี่ยม',
      'label-settings': 'การตั้งค่า',
      'label-language': 'ภาษา',
      'label-notifications': 'การแจ้งเตือน',
      'label-email': 'ที่อยู่อีเมล',
      'logout-btn': 'ออกจากระบบ',
      'tab-benefits': 'สิทธิประโยชน์',
      'tab-saved': 'บันทึก',
      'tab-history': 'ประวัติ',
      'tab-settings': 'การตั้งค่า',
      'nav-home': 'หน้าแรก',
      'nav-search': 'ค้นหา',
      'nav-map': 'แผนที่',
      'nav-saved': 'บันทึก',
      'nav-profile': 'โปรไฟล์'
    }
  };

  function setLang(btn) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.textContent.toLowerCase();
    localStorage.setItem('jeeb-lang', currentLang);
    updateLanguage();
  }

  function updateLanguage() {
    const trans = translations[currentLang] || translations.ja;
    Object.entries(trans).forEach(([id, text]) => {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    });
  }

  // ─── Load User ───
  let currentUser = null;

  function loadUser() {
    const userData = localStorage.getItem('jeeb-user');
    if (!userData) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = JSON.parse(userData);
    updateProfileUI();
  }

  function updateProfileUI() {
    document.getElementById('user-name').textContent = currentUser.name;
    document.getElementById('user-email').textContent = currentUser.email;
    document.getElementById('email-value').textContent = currentUser.email;
    document.getElementById('avatar').textContent = currentUser.avatar;

    // Tier Badge
    const tierEmoji = { silver: '🥈', gold: '🥇', black: '⚫' };
    const tierLabel = { silver: 'Silver', gold: 'Gold', black: 'Black' };
    const badge = document.getElementById('tier-badge');
    badge.className = `user-tier-badge ${currentUser.tier}`;
    badge.textContent = `${tierEmoji[currentUser.tier]} ${tierLabel[currentUser.tier]}`;

    // Subscription Status
    const subBlock = document.getElementById('subscription-block');
    if (currentUser.tier !== 'silver') {
      subBlock.style.display = 'block';
      document.getElementById('sub-tier').textContent = tierLabel[currentUser.tier];
      if (currentUser.subscriptionRenewal) {
        const renewalDate = new Date(currentUser.subscriptionRenewal);
        document.getElementById('sub-renewal').textContent = renewalDate.toLocaleDateString('ja-JP');
        document.getElementById('renewal-row').style.display = 'flex';
      }
    } else {
      document.getElementById('upgrade-banner').style.display = 'block';
    }

    // Benefits List
    const benefits = {
      silver: [
        { icon: '🔍', text: '全店舗検索が可能' },
        { icon: '💬', text: 'レビューの一部表示' },
        { icon: '🔔', text: '予約機能のテスト利用' }
      ],
      gold: [
        { icon: '🔍', text: '全店舗検索が可能' },
        { icon: '💬', text: 'レビュー全文表示' },
        { icon: '💰', text: '5～10%OFFクーポン（月2回まで）' },
        { icon: '⭐', text: '優先予約権' }
      ],
      black: [
        { icon: '🔍', text: '全店舗検索が可能' },
        { icon: '💬', text: 'レビュー全文表示' },
        { icon: '💰', text: '会計割引（カスタム）' },
        { icon: '🎉', text: '限定イベント招待' },
        { icon: '🤝', text: 'VIPサポート' }
      ]
    };

    const benefitsList = document.getElementById('benefits-list');
    benefitsList.innerHTML = benefits[currentUser.tier]
      .map(b => `<div class="benefit-item"><div class="benefit-icon">${b.icon}</div><div>${b.text}</div></div>`)
      .join('');

    // Saved Restaurants
    loadSavedRestaurants();
    loadVisitHistory();

    updateLanguage();
  }

  function loadSavedRestaurants() {
    const savedList = document.getElementById('saved-list');
    if (currentUser.savedRestaurants.length === 0) {
      savedList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">お気に入りに追加されていません</div>
          <div class="empty-text">探索ページからお気に入りに追加できます</div>
        </div>`;
    } else {
      savedList.innerHTML = currentUser.savedRestaurants
        .map(r => `
          <div class="saved-item">
            <div class="saved-item-img">🍣</div>
            <div class="saved-item-info">
              <div class="saved-item-name">${r.name}</div>
              <div class="saved-item-meta">${r.area} · ${r.cuisine}</div>
            </div>
            <div class="saved-item-actions">
              <button class="saved-item-btn" onclick="alert('予約ページへ移動')">予約</button>
            </div>
          </div>`)
        .join('');
    }
  }

  function loadVisitHistory() {
    const historyList = document.getElementById('history-list');
    if (currentUser.visitHistory.length === 0) {
      historyList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">👣</div>
          <div class="empty-title">履歴がありません</div>
          <div class="empty-text">店舗ページを訪問すると履歴が記録されます</div>
        </div>`;
    } else {
      historyList.innerHTML = currentUser.visitHistory
        .map((r, i) => `
          <div class="saved-item">
            <div class="saved-item-img">🍽️</div>
            <div class="saved-item-info">
              <div class="saved-item-name">${r.name}</div>
              <div class="saved-item-meta">${r.date}</div>
            </div>
          </div>`)
        .join('');
    }
  }

  // ─── Tab Switch ───
  function switchTab(btn, tabName) {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(tabName + '-content').classList.add('active');
  }

  // ─── Upgrade Modal ───
  function showUpgradeModal() {
    alert('ゴールド会員プランの詳細は、今後実装予定です。');
  }

  // ─── Logout ───
  function handleLogout() {
    if (confirm('ログアウトしますか？')) {
      localStorage.removeItem('jeeb-user');
      window.location.href = 'index.html';
    }
  }

  // ─── Initialize ───
  window.addEventListener('DOMContentLoaded', loadUser);
</script>

</body>
</html>
